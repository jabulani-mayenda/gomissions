<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 80">
  <!-- TNM Logo Style - Blue/Green -->
  <rect width="200" height="80" fill="white" rx="8"/>
  <!-- TNM colored brand block -->
  <rect x="12" y="12" width="56" height="56" rx="10" fill="#003f87"/>
  <!-- Signal/wave element inside block -->
  <path d="M22,50 Q32,28 42,42 Q47,50 52,35" stroke="white" stroke-width="4" fill="none" stroke-linecap="round"/>
  <circle cx="55" cy="32" r="4" fill="#f5a800"/>
  <!-- TNM text bold in block -->
  <text x="19" y="68" font-family="Arial Black, sans-serif" font-weight="900" font-size="12" fill="white">TNM</text>
  <!-- Mpamba text -->
  <text x="80" y="38" font-family="Arial Black, sans-serif" font-weight="900" font-size="24" fill="#003f87">Mpamba</text>
  <text x="81" y="58" font-family="Arial, sans-serif" font-weight="600" font-size="12" fill="#f5a800" letter-spacing="1">MOBILE MONEY</text>
</svg>
